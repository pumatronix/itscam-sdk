      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  example: cert_for_server1
                password:
                  type: string
                  example: myKeyPassword
              oneOf:
                - required:
                    - p12
                  properties:
                    p12:
                      type: string
