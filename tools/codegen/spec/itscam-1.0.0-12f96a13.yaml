paths:
  /system/audit:
    get:
      description: Gets audit log entries with pagination
      tags:
        - System
      parameters:
        - name: limit
          in: query
          description: 'Maximum number of entries to return (default 100, max 1000)'
          schema:
            type: integer
            minimum: 1
            maximum: 1000
        - name: offset
          in: query
          description: Number of entries to skip for pagination (default 0)
          schema:
            type: integer
            minimum: 0
      responses:
        '200':
          description: successful request
          content:
            application/json:
              schema:
                type: object
                properties:
                  entries:
                    type: array
                    description: Array of audit log entries (most recent first)
                  total:
                    type: integer
                    description: Total number of audit entries in the database
                  limit:
                    type: integer
                    description: Limit used for this query
                  offset:
                    type: integer
                    description: Offset used for this query
        default:
          description: unexpected error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
    delete:
      description: Clears all audit log entries (requires admin privileges)
      tags:
        - System
      responses:
        '200':
          description: successful request
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        default:
          description: unexpected error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
  /system/audit/stats:
    get:
      description: Gets audit log statistics
      tags:
        - System
      responses:
        '200':
          description: successful request
          content:
            application/json:
              schema:
                type: object
                properties:
                  totalEntries:
                    type: integer
                    description: Current number of audit entries stored
                  maxEntries:
                    type: integer
                    description: Maximum number of entries that will be kept
                  percentFull:
                    type: integer
                    description: Percentage of storage used (0-100)
        default:
          description: unexpected error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
  /system/audit/settings:
    get:
      description: Gets audit log settings
      tags:
        - System
      responses:
        '200':
          description: successful request
          content:
            application/json:
              schema:
                type: object
                properties:
                  enabled:
                    type: boolean
    put:
      description: Updates audit log settings (requires admin privileges)
      tags:
        - System
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                enabled:
                  type: boolean
      responses:
        '200':
          description: successful request
  /auth:
    post:
      security: []
      description: Performs Bearer Authentication
      tags:
        - Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                params:
                  required:
                    - username
                    - password
                  type: object
                  properties:
                    username:
                      type: string
                      example: admin
                    password:
                      type: string
                      example: '1234'
      responses:
        '200':
          description: Successful authentication
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
                    example: 1
                  username:
                    type: string
                    example: admin
                  isAdmin:
                    type: boolean
                  lastLoggedIn:
                    type: integer
                    example: 1602774749550
                  token:
                    type: string
                    example: >-
                      eyJ0eXAiOiJKV1QiLCJhbGciOiJIUzI1NiJ9.eyJzdWIiOiJhZG1pbiIsImlkIjoxLCJzY29wZSI6ImFkbWluIiwianRpIjoiMDExNzEzOGQtOTMyNi00N2Q5LWJmYzctZTFlOTNkZDQzZWU3IiwiaWF0IjoxNjAyNzc0NzQ5LCJleHAiOjE2MDI3NzgzNDl9.62u4VuZnmdJTZzMHwvo_b-TyuqH5otJsChT60zpWGKM
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/ServerError'
