name: Deploy documentation

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "docs-site/**"
      - "README.md"
      - "AGENTS.md"
      - "src/**/examples/**"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        working-directory: docs-site
        run: npm install

      - name: Build VitePress site
        working-directory: docs-site
        env:
          VITEPRESS_BASE: /${{ github.event.repository.name }}/
          VITE_AI_SEARCH_API_URL: ${{ vars.VITE_AI_SEARCH_API_URL }}
        run: npm run build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs-site/.vitepress/dist

  sync-ai-search:
    runs-on: ubuntu-latest
    if: vars.AI_SEARCH_INSTANCE_ID != ''
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Sync corpus to Cloudflare AI Search
        working-directory: docs-site
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          AI_SEARCH_INSTANCE_ID: ${{ vars.AI_SEARCH_INSTANCE_ID }}
          AI_SEARCH_NAMESPACE: ${{ vars.AI_SEARCH_NAMESPACE }}
        run: node scripts/sync-ai-search.mjs

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
