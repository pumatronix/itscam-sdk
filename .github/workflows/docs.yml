name: Deploy documentation

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "docs-site/**"
      - "README.md"
      - "README.en-US.md"
      - "AGENTS.md"
      - "src/core/**"
      - "src/wrappers/**"
      - "src/**/examples/**"
      - "tools/docs/**"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Doxygen and Graphviz
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends doxygen graphviz

      - name: Install pdoc, DocFX, gomarkdoc
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install pdoc
          dotnet tool install -g docfx
          echo "$HOME/.dotnet/tools" >> $GITHUB_PATH
          go install github.com/princjef/gomarkdoc/cmd/gomarkdoc@latest
          echo "$(go env GOPATH)/bin" >> $GITHUB_PATH

      - name: Install npm dependencies
        working-directory: docs-site
        run: npm install

      - name: Build core library (needed for pdoc Python imports)
        run: make lib

      - name: Sync content + verify mirror integrity
        run: make docs-sync-check

      - name: Generate API reference (Doxygen, pdoc, DocFX, gomarkdoc)
        run: make docs-api

      - name: Build VitePress site
        working-directory: docs-site
        env:
          VITEPRESS_BASE: /${{ github.event.repository.name }}/
          VITE_AI_SEARCH_API_URL: ${{ vars.VITE_AI_SEARCH_API_URL }}
        run: node node_modules/.bin/vitepress build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs-site/.vitepress/dist

  # Uploads the documentation corpus (docs/, READMEs, AGENTS.md, and the
  # curated example sources) to a Cloudflare R2 bucket connected to the
  # AI Search instance as its data source. Cloudflare AI Search auto-syncs
  # the bucket, so we only need to keep R2 in lockstep with `main`.
  sync-r2-corpus:
    runs-on: ubuntu-latest
    if: vars.R2_BUCKET_NAME != ''
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Stage documentation corpus
        working-directory: docs-site
        run: node scripts/stage-corpus.mjs

      - name: Configure R2 credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.R2_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          aws-region: auto

      - name: Sync corpus to R2
        env:
          R2_BUCKET_NAME: ${{ vars.R2_BUCKET_NAME }}
          R2_ENDPOINT: https://${{ secrets.CF_ACCOUNT_ID }}.r2.cloudflarestorage.com
        run: |
          aws s3 sync docs-site/.corpus-staging "s3://${R2_BUCKET_NAME}/" \
            --endpoint-url "${R2_ENDPOINT}" \
            --delete

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
