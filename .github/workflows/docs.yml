name: Deploy documentation

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "docs-site/**"
      - "README.md"
      - "README.en-US.md"
      - "AGENTS.md"
      - "src/core/**"
      - "src/wrappers/**"
      - "src/**/examples/**"
      - "tools/docs/**"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Doxygen and Graphviz
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends doxygen graphviz

      - name: Install pdoc, DocFX, gomarkdoc
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install pdoc
          dotnet tool install -g docfx
          echo "$HOME/.dotnet/tools" >> $GITHUB_PATH
          go install github.com/princjef/gomarkdoc/cmd/gomarkdoc@latest
          echo "$(go env GOPATH)/bin" >> $GITHUB_PATH

      - name: Install npm dependencies
        working-directory: docs-site
        run: npm install

      - name: Build core library (needed for pdoc Python imports)
        run: make lib

      - name: Sync content + verify mirror integrity
        run: make docs-sync-check

      - name: Generate API reference (Doxygen, pdoc, DocFX, gomarkdoc)
        run: make docs-api

      - name: Build VitePress site
        working-directory: docs-site
        env:
          VITEPRESS_BASE: /${{ github.event.repository.name }}/
          VITE_AI_SEARCH_API_URL: ${{ vars.VITE_AI_SEARCH_API_URL }}
        run: node node_modules/.bin/vitepress build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs-site/.vitepress/dist

  sync-ai-search:
    runs-on: ubuntu-latest
    if: vars.AI_SEARCH_INSTANCE_ID != ''
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Sync corpus to Cloudflare AI Search
        working-directory: docs-site
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          AI_SEARCH_INSTANCE_ID: ${{ vars.AI_SEARCH_INSTANCE_ID }}
          AI_SEARCH_NAMESPACE: ${{ vars.AI_SEARCH_NAMESPACE }}
        run: node scripts/sync-ai-search.mjs

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
